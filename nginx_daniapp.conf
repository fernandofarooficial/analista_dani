# Configuração nginx para DaniApp
# Adicionar dentro do bloco server {} existente em /etc/nginx/sites-enabled/
# (o mesmo arquivo que já contém camera300, coletorgrafana, retail_analytics)

    location /daniapp/ {
        proxy_pass         http://127.0.0.1:5004/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Prefix /daniapp;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }
